  - label: Show icons for hard drives, servers, and removable media on the desktop (4/4)
    domain: com.apple.finder
    key: ShowRemovableMediaOnDesktop
    type: bool
    value: true

  - label: Hot corners - top left - lock screen (1/2)
    domain: com.apple.dock
    key: wvous-tl-corner
    type: int
    value: 13

  - label: Hot corners - top left - lock screen (2/2)
    domain: com.apple.dock
    key: wvous-tl-modifier
    type: int
    value: 0

  - label: Safari - Privacy - don’t send search queries to Apple (1/2)
    domain: com.apple.Safari
    key: UniversalSearchEnabled
    type: bool
    value: false
    become: true

  - label: Safari - Privacy - don’t send search queries to Apple (1/2)
    domain: com.apple.Safari
    key: SuppressSearchSuggestions
    type: bool
    value: true
    become: true

  - label: Safari - Show the full URL in the address bar (this still hides the scheme)
    domain: com.apple.Safari
    key: ShowFullURLInSmartSearchField
    type: bool
    value: true
    become: true

  - label: Safari - Enable <Do Not Track>
    domain: com.apple.Safari
    key: SendDoNotTrackHTTPHeader
    type: bool
    value: true
    become: true

  - label: Safari - Update extensions automatically
    domain: com.apple.Safari
    key: InstallExtensionUpdatesAutomatically
    type: bool
    value: true
    become: true

  - label: Terminal - Only use UTF-8
    domain: com.apple.terminal
    key: StringEncodings
    type: array
    value:
      - 4
    become: true

  - label: Enable the automatic update check
    domain: com.apple.SoftwareUpdate
    key: AutomaticCheckEnabled
    type: bool
