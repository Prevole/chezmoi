  - label: Show icons for hard drives, servers, and removable media on the desktop (1/4)
    domain: com.apple.finder
    key: ShowExternalHardDrivesOnDesktop
    type: bool
    value: true

  - label: Show icons for hard drives, servers, and removable media on the desktop (2/4)
    domain: com.apple.finder
    key: ShowHardDrivesOnDesktop
    type: bool
    value: true

  - label: Show icons for hard drives, servers, and removable media on the desktop (3/4)
    domain: com.apple.finder
