    key: AutomaticDownload
    type: int
    value: 1

  - label: Install System data files & security updates
    domain: com.apple.SoftwareUpdate
    key: CriticalUpdateInstall
    type: int
    value: 1

  - label: iTerm2 - Specify the preferences directory
    domain: com.googlecode.iterm2.plist
    key: PrefsCustomFolder
    type: string
    value: "{{ all_home_directory }}/Documents/repositories/private/iTerm2"

  - label: iTerm2 - Use the custom preferences in the directory
    domain: com.googlecode.iterm2.plist
    key: LoadPrefsFromCustomFolder
    type: bool
    value: true

