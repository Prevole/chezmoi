  - label: Show indicator lights for open applications in the Dock
    domain: com.apple.dock
    key: show-process-indicators
    type: bool
    value: true

  - label: Don’t automatically rearrange Spaces based on most recent use
    domain: com.apple.dock
    key: mru-spaces
    type: bool
    value: false


  - label: Hot corners - bottom right - lock screen (1/2)
    domain: com.apple.dock
    key: wvous-br-corner
    type: int
    value: 4

  - label: Hot corners - bottom right - lock screen (2/2)
    domain: com.apple.dock
    key: wvous-br-modifier
    type: int
    value: 0

  - label: Safari - Hide bookmarks bar by default
    domain: com.apple.Safari
    key: ShowFavoritesBar
    type: bool
    value: false
    become: true

  - label: Safari - Enable Safari’s debug menu
    domain: com.apple.Safari
    key: IncludeInternalDebugMenu
    type: bool
    value: true
    become: true

  - label: Safari - Enable the Develop menu and the Web Inspector (1/3)
    domain: com.apple.Safari
    key: IncludeDevelopMenu
    type: bool
    value: true
    become: true

  - label: Safari - Enable the Develop menu and the Web Inspector (2/3)
    domain: com.apple.Safari
    key: WebKitDeveloperExtrasEnabledPreferenceKey
    type: bool
    value: true
    become: true

  - label: Safari - Enable the Develop menu and the Web Inspector (3/3)
    domain: com.apple.Safari
    key: com.apple.Safari.ContentPageGroupIdentifier.WebKit2DeveloperExtrasEnabled
    type: bool
    value: true
    become: true

  - label: Safari - Add a context menu item for showing the Web Inspector in web views
    domain: NSGlobalDomain
    key: WebKitDeveloperExtras
    type: bool
    value: true
    become: true

  - label: Mail - Disable send and reply animations (1/2)
    domain: com.apple.mail
    key: DisableReplyAnimations
    type: bool
    value: true
    become: true

  - label: Mail - Disable send and reply animations (2/2)
    domain: com.apple.mail
    key: DisableSendAnimations
    type: bool
    value: true
    become: true

  - label: Mail - Copy email addresses as `foo@example.com` instead of `Foo Bar <foo@example.com>`
    domain: com.apple.mail
    key: AddressesIncludeNameOnPasteboard
    type: bool
    value: false
    become: true

  - label: Activity Monitor - Show the main window when launching Activity Monitor
    domain: com.apple.ActivityMonitor
    key: OpenMainWindow
    type: bool
    value: true

  - label: Activity Monitor - Visualize CPU usage in the Activity Monitor Dock icon
    domain: com.apple.ActivityMonitor
    key: IconType
    type: int
    value: 5

  - label: Activity Monitor - Show all processes in Activity Monitor
    domain: com.apple.ActivityMonitor
    key: ShowCategory
    type: int
    value: 0

  - label: Activity Monitor - Sort Activity Monitor results by CPU usage (1/2)
    domain: com.apple.ActivityMonitor
    key: SortColumn
    type: string
    value: CPUUsage

  - label: Activity Monitor - Sort Activity Monitor results by CPU usage (2/2)
    domain: com.apple.ActivityMonitor
    key: SortDirection
    type: int
    value: 0

  - label: TextEdit - Use plain text mode for new documents
    domain: com.apple.TextEdit
    key: RichText
    type: int
    value: 0

  - label: TextEdit - Open and save files as UTF-8 (1/2)
    domain: com.apple.TextEdit
    key: PlainTextEncoding
    type: int
    value: 4

  - label: TextEdit - Open and save files as UTF-8 (2/2)
    domain: com.apple.TextEdit
    key: PlainTextEncodingForWrite
    type: int
    value: 4

  - label: Show the path bar in the finder
    domain: com.apple.finder
    key: ShowPathbar
    type: bool
    value: true

  - label: Show the status bar in the finder
    domain: com.apple.finder
    key: ShowStatusBar
    type: bool
    value: true

  - label: Show the files extensions
    domain: NSGlobalDomain
    key: AppleShowAllExtensions
    type: bool
    value: true

  - label: Show wraning before changing an extension
    domain: com.apple.finder
    key: FXEnableExtensionChangeWarning
    type: bool
    value: false

  - label: Show warning before removing from iCloud Drive
    domain: com.apple.finder
    key: FXEnableRemoveFromICloudDriveWarning
    type: bool
    value: false

  - label: Control Centre Modules > Bluetooth > Show in Menu Bar
    domain: com.apple.controlcenter
    key: NSStatusItem Visible Bluetooth
    type: bool
    value: true

  - label: Control Centre Modules > Screen Mirroring > Don't Show in Menu Bar
    domain: com.apple.airplay
    key: showInMenuBarIfPresent
    type: bool
    value: true

  - label: Control Centre Modules > Sound > Always Show in Menu Bar
    domain: com.apple.controlcenter
    key: NSStatusItem Visible Sound
    type: bool
    value: true

  - label: Control Centre Modules > Now Playing > Don't Show in Menu Bar
    domain: com.apple.airplay
    key: NSStatusItem Visible NowPlaying
    type: bool
    value: false

  - label: Ask Siri
    domain: com.apple.Siri
    key: SiriPrefStashedStatusMenuVisible
    type: bool
    value: false

  - label: Ask Siri
    domain: com.apple.Siri
    key: VoiceTriggerUserEnabled
    type: bool
    value: false

  - label: Dock > Size
    domain: com.apple.dock
    key: tilesize
    type: int
    value: 36

  - label: Dock > Magnification
    domain: com.apple.dock
    key: largesize
    type: int
    value: 54

  - label: Dock > Magnification
    domain: com.apple.dock
    key: magnification
    type: bool
    value: true

  - label: Dock > Minimize windows using - Scale effect
    domain: com.apple.dock
    key: mineffect
    type: string
    value: scale

  - label: Dock > Minimize windows into application icon
    domain: com.apple.dock
    key: minimize-to-application
    type: bool
    value: true

  - label: Dock > Automatically hide and show the Dock
    domain: com.apple.dock
    key: autohide
    type: bool
    value: true

  - label: Dock > Automatically hide and show the Dock (duration)
    domain: com.apple.dock
    key: autohide-time-modifier
    type: float
    value: 0.4

  - label: Dock > Automatically hide and show the Dock (delay)
    domain: com.apple.dock
    key: autohide-delay
    type: float
    value: 0

  - label: Show recent applications in Dock
    domain: com.apple.dock
    key: show-recents
    type: bool
    value: false

  - label: Windows & Apps > Prefer tabs when opening documents
    domain: NSGlobalDomain
    key: AppleWindowTabbingMode
    type: string
    value: always

  - label: Desktop & Stage Manager > Click Wallpaper to reveal desktop > Only in Stage Manager
    domain: com.apple.WindowManager
    key: EnableStandardClickToShowDesktop
    type: bool
    value: false

  - label: Mission Control > Automatically rearrange Spaces based on most recent use
    domain: com.apple.dock
    key: mru-spaces
    type: bool
    value: false

  - label: Expand save panel by default (1/2)
    domain: NSGlobalDomain
    key: NSNavPanelExpandedStateForSaveMode
    type: bool
    value: true

  - label: Expand save panel by default (2/2)
    domain: NSGlobalDomain
    key: NSNavPanelExpandedStateForSaveMode2
    type: bool
    value: true

  - label: Expand print panel by default (1/2)
    domain: NSGlobalDomain
    key: PMPrintingExpandedStateForPrint
    type: bool
    value: true

  - label: Expand print panel by default (1/2)
    domain: NSGlobalDomain
    key: PMPrintingExpandedStateForPrint2
    type: bool
    value: true

  - label: Save to disk (not to iCloud) by default
    domain: NSGlobalDomain
    key: NSDocumentSaveNewDocumentsToCloud
    type: bool
    value: false

  - label: Automatically quit printer app once the print jobs complete
    domain: com.apple.print.PrintingPrefs
    key: Quit When Finished
    type: bool
    value: true

  - label: Enable full keyboard access for all controls (example -> enable Tab in modal dialogs)
    domain: NSGlobalDomain
    key: AppleKeyboardUIMode
    type: int
    value: 3

  - label: Require password immediately after sleep or screen saver begins (1/2)
    domain: com.apple.screensaver
    key: askForPassword
    type: int
    value: 1

  - label: Require password immediately after sleep or screen saver begins (2/2)
    domain: com.apple.screensaver
    key: askForPasswordDelay
    type: int
    value: 0

