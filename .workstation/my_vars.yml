my_osx_defaults:
  - label: Configure the finder list view of files
    domain: com.apple.finder
    key: FXPreferredViewStyle
    type: string
    value: Nlsv

  - label: Show hidden files
    domain: com.apple.finder
    key: AppleShowAllFiles
    type: bool
    value: true

  - label: Search by default in the current folder
    domain: com.apple.finder
    key: FXDefaultSearchScope
    type: string
    value: SCcf

  - label: Click in the scrollbar to Jump to the spot that's clicked
    domain: NSGlobalDomain
    key: AppleScrollerPagingBehavior
    type: bool
    value: true

  - label: Menu Bar Only > Spotlight > Don't Show in Menu Bar
    domain: com.apple.Spotlight
    key: MenuItemHidden
    type: int
    value: 1

  - label: Key repeat rate
    domain: NSGlobalDomain
    key: KeyRepeat
    type: float
    value: 2

  - label: Delay until repeat
    domain: NSGlobalDomain
    key: InitialKeyRepeat
    type: float
    value: 15

  - label: Txt Input > Show Input menu in menu bar
    domain: com.apple.TextInputMenu
    key: visible
    type: bool
    value: true

  - label: Keyboard navigation
    domain: NSGlobalDomain
    key: AppleKeyboardUIMode
    type: int
    value: 2

  - label: Txt Input > Correct spelling automatically
    domain: NSGlobalDomain
    key: NSAutomaticSpellingCorrectionEnabled
    type: bool
    value: false

  - label: Txt Input > Capitalise words automatically
    domain: NSGlobalDomain
    key: NSAutomaticCapitalizationEnabled
    type: bool
    value: false

  - label: Disable smart dashes as they’re annoying when typing code
    domain: NSGlobalDomain
    key: NSAutomaticDashSubstitutionEnabled
    type: bool
    value: false

  - label: Disable automatic period substitution as it’s annoying when typing code
    domain: NSGlobalDomain
    key: NSAutomaticPeriodSubstitutionEnabled
    type: bool
    value: false

  - label: Disable smart quotes as they’re annoying when typing code
    domain: NSGlobalDomain
    key: NSAutomaticQuoteSubstitutionEnabled
    type: bool
    value: false

  - label: Txt Input > Add full stop with double-space
    domain: NSGlobalDomain
    key: NSAutomaticPeriodSubstitutionEnabled
    type: bool
    value: false

  - label: Disable press-and-hold for keys in favor of key repeat
    domain: NSGlobalDomain
    key: ApplePressAndHoldEnabled
    type: bool
    value: false

  - label: Tap to click (1/3)
    domain: com.apple.driver.AppleBluetoothMultitouch.trackpad
    key: Clicking
    type: int
    value: 1

  - label: Tap to click (2/3)
    domain: com.apple.AppleMultitouchTrackpad
    key: Clicking
    type: int
    value: 1

  - label: Tap to click (3/3)
    domain: NSGlobalDomain
    key: com.apple.mouse.tapBehavior
    type: int
    value: 1

  - label: Trackpad - map bottom right corner to right-click (1/4)
    domain: com.apple.driver.AppleBluetoothMultitouch.trackpad
    key: TrackpadCornerSecondaryClick
    type: int
    value: 2

  - label: Trackpad - map bottom right corner to right-click (2/4)
    domain: com.apple.driver.AppleBluetoothMultitouch.trackpad
    key: TrackpadRightClick
    type: bool
    value: true

  - label: Trackpad - map bottom right corner to right-click (3/4)
    # TODO: -currentHost
    domain: NSGlobalDomain
    key: com.apple.trackpad.trackpadCornerClickBehavior
    type: int
    value: 1

  - label: Trackpad - map bottom right corner to right-click (4/4)
    # TODO: -currentHost
    domain: NSGlobalDomain
    key: com.apple.trackpad.enableSecondaryClick
    type: bool
    value: true

    # Reference: https://github.com/kevinSuttle/macOS-Defaults/issues/17#issuecomment-266633501
  - label: Enable subpixel font rendering on non-Apple LCDs
    domain: NSGlobalDomain
    key: AppleFontSmoothing
    type: int
    value: 1

  - label: Enable HiDPI display modes (requires restart)
    domain: /Library/Preferences/com.apple.windowserver
    key: DisplayResolutionEnabled
    type: bool
    value: true
    become: true

  - label: Finder - disable window animations and Get Info animations
    domain: com.apple.finder
    key: DisableAllAnimations
    type: bool
    value: true

